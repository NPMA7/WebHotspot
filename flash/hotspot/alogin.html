<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2; url=$(link-redirect)">
    <title>Koneksi Berhasil — Mengalihkan...</title>
    <style>
        :root {
            --bg-base: #060713;
            --bg-card: rgba(13, 16, 39, 0.45);
            --border-card: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Orbs */
        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 {
            background: #6366f1;
            top: 15%;
            left: 20%;
        }
        .orb-2 {
            background: #a855f7;
            bottom: 15%;
            right: 20%;
        }

        .container {
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .success-icon-wrapper {
            width: 64px;
            height: 64px;
            background: var(--primary-glow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--success);
            position: relative;
        }

        .success-icon-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px solid var(--success);
            animation: pulse 2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
        }

        .success-icon {
            width: 32px;
            height: 32px;
            color: var(--success);
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 24px 0;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        .fallback-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            transition: opacity 0.2s;
        }
        .fallback-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
    </style>
    <script type="text/javascript">
        // Instantly check if there is a target redirect link
        function doRedirect() {
            setTimeout(function() {
                var target = "$(link-redirect)";
                if (!target || target.indexOf('generate_204') !== -1 || target.indexOf('gstatic') !== -1 || target.indexOf('msftconnecttest') !== -1 || target.indexOf('connectivitycheck') !== -1) {
                    target = "https://www.google.com";
                }
                window.location.href = target;
            }, 1000);
        }
    </script>
</head>
<body onLoad="doRedirect()">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <div class="card">
            <div class="success-icon-wrapper">
                <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
            <h2>Koneksi Sukses!</h2>
            <p>Perangkat Anda berhasil diotorisasi untuk akses internet.</p>
            
            <div class="spinner"></div>
            
            <div>
                <a class="fallback-link" href="$(link-redirect)">Jika Anda tidak dialihkan otomatis, klik di sini</a>
            </div>
        </div>
    </div>
</body>
</html>
