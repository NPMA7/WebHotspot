<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koneksi Terputus — Logout Berhasil</title>
    <style>
        :root {
            --bg-base: #060713;
            --bg-card: rgba(13, 16, 39, 0.45);
            --border-card: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            position: relative;
        }

        /* Ambient Orbs */
        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 {
            background: #6366f1;
            top: 15%;
            left: 20%;
        }
        .orb-2 {
            background: #a855f7;
            bottom: 15%;
            right: 20%;
        }

        .container {
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--text-muted);
        }

        .icon {
            width: 28px;
            height: 28px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 30px 0;
        }

        .stats-list {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 12px 18px;
            margin-bottom: 30px;
            text-align: left;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
        }

        .stat-lbl {
            color: var(--text-muted);
        }

        .stat-val {
            font-weight: 500;
        }

        .btn-login {
            display: flex;
            width: 100%;
            background: var(--primary);
            color: white;
            border-radius: 14px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            box-sizing: border-box;
            border: none;
        }

        .btn-login:hover {
            opacity: 0.9;
            box-shadow: 0 8px 20px var(--primary-glow);
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <div class="card">
            <div class="icon-wrapper">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <h2>Koneksi Terputus</h2>
            <p>Anda telah berhasil keluar dari jaringan WiFi.</p>

            <div class="stats-list">
                <div class="stat-row">
                    <div class="stat-lbl">Username</div>
                    <div class="stat-val">$(username)</div>
                </div>
                <div class="stat-row">
                    <div class="stat-lbl">Total Uptime</div>
                    <div class="stat-val">$(uptime)</div>
                </div>
                <div class="stat-row">
                    <div class="stat-lbl">Total Upload</div>
                    <div class="stat-val">$(bytes-out-nice)</div>
                </div>
                <div class="stat-row">
                    <div class="stat-lbl">Total Download</div>
                    <div class="stat-val">$(bytes-in-nice)</div>
                </div>
            </div>

            <a class="btn-login" href="$(link-login)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                Masuk Kembali
            </a>
        </div>
    </div>
</body>
</html>
