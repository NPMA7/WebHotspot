<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Hotspot — Koneksi Aktif</title>
    <style>
        :root {
            --bg-base: #060713;
            --bg-card: rgba(13, 16, 39, 0.45);
            --border-card: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.15);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            position: relative;
        }

        /* Ambient Orbs */
        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 {
            background: #6366f1;
            top: 15%;
            left: 20%;
        }
        .orb-2 {
            background: #a855f7;
            bottom: 15%;
            right: 20%;
        }

        .container {
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 24px;
            padding: 35px 25px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: var(--primary-glow);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: var(--primary);
        }

        .logo svg {
            width: 24px;
            height: 24px;
        }

        h2 {
            margin: 0 0 6px 0;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 12px 16px;
        }

        .stat-label {
            font-size: 0.725rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .stat-val {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .info-list {
            margin-bottom: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 0.875rem;
        }

        .info-lbl {
            color: var(--text-muted);
        }

        .info-val {
            font-weight: 500;
        }

        .btn-logout {
            width: 100%;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-radius: 14px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            box-shadow: 0 8px 20px var(--danger-glow);
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M18 11.03a6.48 6.48 0 0 0-9-1.24m7.72 5a3.49 3.49 0 0 0-4.9-.73m4.35 4.35a1 1 0 1 0-1.41-1.41M12 2a10 10 0 0 1 10 10 10 10 0 0 1-10 10A10 10 0 0 1 2 12 10 10 0 0 1 12 2z"></path>
                    </svg>
                </div>
                <h2>Status Internet Aktif</h2>
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>Terhubung</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Upload</div>
                    <div class="stat-val">$(bytes-out-nice)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Download</div>
                    <div class="stat-val">$(bytes-in-nice)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Uptime</div>
                    <div class="stat-val">$(uptime)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Sisa Waktu</div>
                    <div class="stat-val">$(session-time-left || "Unlimited")</div>
                </div>
            </div>

            <div class="info-list">
                <div class="info-row">
                    <div class="info-lbl">Username</div>
                    <div class="info-val">$(username)</div>
                </div>
                <div class="info-row">
                    <div class="info-lbl">IP Address</div>
                    <div class="info-val">$(ip)</div>
                </div>
                <div class="info-row">
                    <div class="info-lbl">MAC Address</div>
                    <div class="info-val">$(mac)</div>
                </div>
            </div>

            <form action="$(link-logout)" name="logout" onSubmit="return true;">
                <input type="hidden" name="erase-cookie" value="true">
                <button type="submit" class="btn-logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout / Keluar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
