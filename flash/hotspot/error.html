<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesalahan Jaringan — Gagal Terhubung</title>
    <style>
        :root {
            --bg-base: #060713;
            --bg-card: rgba(13, 16, 39, 0.45);
            --border-card: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.15);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            position: relative;
        }

        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 {
            background: #ef4444;
            top: 15%;
            left: 20%;
        }
        .orb-2 {
            background: #a855f7;
            bottom: 15%;
            right: 20%;
        }

        .container {
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: var(--danger-glow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--danger);
            position: relative;
        }

        .icon-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px solid var(--danger);
            animation: pulse 2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
        }

        .icon {
            width: 28px;
            height: 28px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 14px;
            padding: 16px;
            color: #fca5a5;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 30px;
            text-align: center;
            word-break: break-word;
        }

        .btn-back {
            display: flex;
            width: 100%;
            background: var(--primary);
            color: white;
            border-radius: 14px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            box-sizing: border-box;
            border: none;
        }

        .btn-back:hover {
            opacity: 0.9;
            box-shadow: 0 8px 20px var(--primary-glow);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <div class="card">
            <div class="icon-wrapper">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
            <h2>Terjadi Kesalahan Jaringan</h2>
            
            <div class="error-box">
                $(error)
            </div>

            <a class="btn-back" href="$(link-login)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Kembali ke Halaman Login
            </a>
        </div>
    </div>
</body>
</html>
