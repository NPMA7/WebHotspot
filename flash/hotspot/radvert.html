<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; url=$(link-redirect)">
    <title>Mengalihkan Ke Jaringan...</title>
    <style>
        :root {
            --bg-base: #060713;
            --bg-card: rgba(13, 16, 39, 0.45);
            --border-card: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 {
            background: #6366f1;
            top: 15%;
            left: 20%;
        }
        .orb-2 {
            background: #a855f7;
            bottom: 15%;
            right: 20%;
        }

        .container {
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: var(--primary-glow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--primary);
            position: relative;
        }

        .icon {
            width: 30px;
            height: 30px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 24px 0;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        .fallback-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
        }
        .fallback-link:hover {
            text-decoration: underline;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <div class="card">
            <div class="icon-wrapper">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 12h14M12 5l7 7-7 7"></path>
                </svg>
            </div>
            <h2>Mengalihkan Akses...</h2>
            <p>Harap tunggu sebentar sementara kami menghubungkan sesi Anda.</p>
            
            <div class="spinner"></div>
            
            <div>
                <a class="fallback-link" href="$(link-redirect)">Jika tidak dialihkan otomatis, klik di sini</a>
            </div>
        </div>
    </div>
</body>
</html>
